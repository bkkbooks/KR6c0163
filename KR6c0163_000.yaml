front:
  text: 林子心經釋略槩論總序或問釋氏之教都無有法若未離法便不是佛是耶非耶林子喟然嘆曰此余心經釋略槩論之所由作也而子曾見余之釋略槩論乎未也然佛之地步甚高而必至於虗空本體本體虗空無有一法乃可名佛而曰若未離法便不是佛豈不然哉然必由積久而後能致如釋迦所謂吾一劫至於千萬劫而吾精進之心未嘗少退子豈不聞之乎而曰釋氏之教都無有法者余亦未敢以為然故始於有法者筏喻以渡河也終於無法者舍筏而登岸也他如金剛經所云應如是住如是降伏其心夫曰住曰降伏謂非有法而何縱是聖賢亦且有無為法矣況其下乎至於楞嚴經所載二十五聖圓通圓覺經之二十一漸教三頓教一圓教天台止觀之十八觀是皆釋氏之法萬古不易之常經也然則心經亦有法歟林子曰然若首下一觀字豈非十八觀之義乎其曰菩提薩埵依般若波羅蜜多故是乃聖賢之無為法也然呪亦法也揭之揭之又復揭之不謂之漸教而何豈曰二十五聖即三世諸佛抑亦不能外法以成佛矣龍江兆恩附心經釋論就正小柬兆恩拜告諸善知識者兆恩嘗以六祖而上佛法明六祖而下佛法不明法既不明而其談佛之最以為得者相傳密訣只有空之一字當下即能成佛何其易也似賢於釋迦遠矣甚而儒門之士亦有陰襲其言互相告語以為孔子之道亦是如此始之以亂釋迦之教終之以壞孔子之學此道之所以不明於天下萬世也噫兆恩不自揣分漫著心經釋略槩論二帙每竊以為釋迦復起必從吾言幸今佛法再興而十室之邑必有善知識者若能不以兆恩為愚惠然遠臨盡言相正自當有以教我也
