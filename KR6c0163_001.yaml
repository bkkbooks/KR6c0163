body:
  text: 門人王興重閱表希朱挍正摩訶般若波羅蜜多心經林子曰梵語摩訶華言大梵語般若華言智慧其曰智慧者乃余之所謂實地之真心也梵語波羅蜜華言到彼岸其曰彼岸者乃余之所謂真心之實地而為色空之所不到處也多與少對多多之也行深而至於大智慧到彼岸此其最上一乘之可多也然彼岸實地中本無一法可得而萬法皆從此出者多之也心經者吾心之真經也一切現成故從劫至劫手不釋卷從晝至夜無不念時乃所以持吾心之真經也惟此真經也以離一切色相以離一切空相而安此色空二字俱不可得也若非親到彼岸者其孰能知之金剛經曰一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出昔有釋之者曰皆從此經出者非以指此一經文句語言又曰且道此經從甚處出須彌頂上大海波心又曰此經者人人俱有箇箇周圓上及諸佛下及螻蟻亦具此經即妙圓覺心是也無物堪比又曰茲經喻如大地何物不從地之所生諸佛惟指一心何法不從心之所立國初僧宗泐曰此經即世尊所說大部般若之精要故知菩薩之說即是佛說傳至中華凡五譯今從玄奘所譯者以中國盛行故也國初宋潛溪曰心者世間及出世間萬法總相其別有五一肉團心狀如蕉蕾生色身中係無情攝二緣慮心狀如野燒忽生忽滅係妄想攝三集起心狀如草子埋伏識田係習氣攝四賴耶心狀如良田細種無厭係無明攝五真如心狀同虗空廓彼法界係寂照攝余所言者皆最上一乘之第一義也而於字訓姑且略之故曰釋略今依諸生之請而以昔人所訓字義附於各章之後觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄林子曰觀與照別未到彼岸則不得不觀既到彼岸則亦照見之而已矣故照見也者猶俗所云看見者是也盖既到彼岸之時而看見此彼岸中一無所有故曰時照見五蘊皆空一切之現成也菩薩而曰自在者以其深處於彼岸實地之中而為色空之所不到處者奚有於塵生之色亦奚有於塵滅之空無色無空夫誰得而罣礙之故曰自在菩薩自在菩薩者自性菩薩也而真如之性則徧於一切處釋氏謂之無形無相無背無面六根四大俱無只有一相亦是無相十方國土無不現身若非親到彼岸者其孰能知之行深有二義皆不可不知也若以行作去聲而曰行深者三千威儀八萬細行而功行則極其大矣若以行作平聲而曰行深者應如是住如是降伏而修為則極其至矣摩訶般若者大智慧而見性也波羅蜜者到彼岸而入頓也故見性也者以了知此無上正等正覺之佛性悉備於彼岸實地中五陰本空一切之現成也多古語所謂有足多之多時到彼岸之時度度之也度苦海以登彼岸也而眾生則從生至死從劫至劫皆受此一切苦厄不能出離而彼岸實地元無苦海而又奚待於度耶故照也者照而無所於照也空也者空而無所於空也度也者度而無所於度也若曰照而有所於照空而有所於空度而有所於度即是未到彼岸有假人為而謂之一切現成不可也林子曰彼岸實地而為色空之所不到處者乃自在菩薩之所住處也然處猶家也自在菩薩所住之處即自在菩薩所住之家曰處曰家壇經所謂門內甚深法界者是也若能知此甚深法界而為自在菩薩之所住處一超而入便是到家之人然而甚深法界得而入之乎自在菩薩得而觀之乎林子曰即心即佛而真心元在於實地之中者是真佛深處於彼岸之際也故不詣實地而談真心不到彼岸而談真佛者豈非所謂門外漢耶林子曰不登佛位安能識佛不知本來安識無物林子曰若離實地便是離心若離彼岸便是離佛元古雲曰五蘊即五陰其曰蘊者積聚義也其曰陰者盖覆義也潛溪曰五蘊者色受想行識也色蘊四大所成受蘊領納苦樂又不苦不樂想蘊即種種境奔馳不息行蘊諸所心法多貪境弗止識蘊於所緣境熾然了別五蘊之中識以分別居先因其分別而領納在心謂之受心既領納相續尋思謂之想想之不已遂成造作謂之行舍利子色不異空空不異色色即是空空即是色受想行識亦復如是林子曰此呼舍利子而警之而以色空二字對待言之盖恐其有著於有無二見也若所云五蘊皆空者乃色空之所不到處本無空也奚有於色色空俱泯心經之本旨一切現成也而歷代註解皆曰色因空顯空為色亡又曰無空不顯色無色不明空等語如此見解不謂之對待之義耶故曰色不異空空不異色豈曰不異而又曰即是者何也以其不能見性二者病在一般也三祖僧璨曰圓同太虗無欠無餘此乃本體自然一切之現成也若非親到彼岸者其孰能知之又曰莫逐有緣勿住空忍若逐有緣即是迷空以為色若住空忍即是泯色以為空二者盖胥失之而非一切之現成矣林子曰余嘗譬之石焉火之性蘊於石之中而石之中但惟有火之性已爾本無火也奚有於滅既無火矣而有色乎哉既無滅矣而有空乎哉而人之性亦猶是也然石擊之則火生頃之而火滅火生則有火之色火滅則無火之色而空矣而生而色而滅而空都在石外殊不知真性本不在外也顧乃於塵之色空上做工夫則亦何異於火之生滅上討分曉而謂之能見性而入頓也可乎哉壇經曰只在門外未入門內林子曰余嘗譬之鏡焉塵來則色塵去則空是鏡之色空皆由於外塵之去來如此然而鏡之所以能照之本體者抑亦其色空之所不到處者乎潛溪曰凡有形者皆謂之色凡無形者皆謂之空舍利子是諸法空相林子曰此呼舍利子而重警之而專以空之一字言之盖惟恐其不知心經之本旨而有著於法而有著於相有所然而空之也然真性上不容一物彼岸中一切現成而無有法而無有相而曰法曰相便是有物而非彼岸實地中之現成矣壇經曰常離法相自由自在又曰離諸法相一無所得是字指上文空不異色空即是色句林生問曰夫既空矣安得有相林子曰豈曰色有色相而空亦有空相矣又問何謂空相林子曰余嘗指諸空器而問之人曰器中何物也答曰吾但見器中之空爾夫空可得而見之不謂之空有空相耶有相則有見無相則無見余於是而知空相之空是亦色相之色也着空着色亦有何異故曰其為失性均也林子曰空之一字最易惑人然凡夫則易惑於色而二乘則易惑於空夫惑於色者猶可得而言之而惑於空者則不可得而言之而世之註解者率皆不知佛無有法空無有相而執著於上文五蘊皆空句而曰真空實相謬之甚也殊不知無空之空是謂真空無相之相是謂實相若曰空相則是空也亦可得而見之矣而余之所謂色空不到處之真空其有空乎其有相乎其可得而見乎若非親到彼岸者其孰能知之大抵心經大旨皆以彼岸實地中本無五蘊可空也而學佛之徒乃不知彼岸實地之謂何而謂有法可以空五蘊而空之終不免入於想像而謂虗空無有相貌以為空也豈曰色空俱忘亦是知見故曰是諸法空相以深警之也不生不滅不垢不淨不增不減是故空中無色無受想行識林子曰若前所謂五蘊皆空者盖彼岸實地中而為色空之所不到處者五蘊本空也夫五蘊本空矣則安有生既不有生則安有滅垢淨增減亦復如是故曰空中無色無受想行識者一切之現成也若非親到彼岸者其孰能知之此章應上五蘊皆空句無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故林子曰此下詳言之以彼岸實地中一無所有非特無色無受想行識焉已也而彼岸實地其有眼耳鼻舌身意乎其有色聲香味觸法乎其有無明乎而無無明盡其有老死乎而無老死盡其可以智而知以苦以集以滅以道而得之乎其有罣礙乎其有恐怖乎其有顛倒夢想乎然此亦皆塵之生滅去來爾而彼岸實地乃其塵之所不到處一切之現成也若非親到彼岸者其孰能知之林子曰形骸中有眼有耳有鼻有舌有身有意而有六根矣而彼岸實地則超出於形骸之外無眼無耳無鼻無舌無身無意而無六根也夫既無六根矣而必於屬眼之色而空之以為空者何歟若余之所謂彼岸實地者則自其真去處之無色無空者言之而非謂外著於六根之眼空其色而空之也若外著於六根之眼空其色而空之則亦不免入山圜坐避塵以求靜也殊不知彼岸實地而為色空之所不到處者而奚有於塵之可避又奚有於靜之可求耶若非親到彼岸者其孰能知之經曰得阿耨多羅三藐三菩提而阿耨多羅三藐三菩提得而得之乎得而無所於得無所得而得也故曰以無所得故若存無所得心而自以為得者便是有修有證有所得而不空矣而色空之所不到處者一切現成也而奚有於脩奚有於證奚有於得耶故故也者故也此無所得故并下文二依般若波羅蜜多故無罣礙故是皆本體之自然一切之現成也故曰故故故也者謂我元所自有之故物木如是也潛溪曰眼耳鼻舌身意謂之六根猶草木之有根也亦謂之六入根則主內而言入則主外而言眼見為色塵耳聞為聲塵鼻嗅為香塵舌甞為味塵身染為觸塵意著為法塵是謂之六塵謂如沙塵之障蔽也根塵二者和合為十二處處所也言各有所在也從見為眼識從聞為耳識從嗅為鼻識從甞為舌識從染為身識從分別為意識謂之六識識謂妄生辨析昏翳真智也三者和合為十八界界者限也言各有限域也乃至者省文上舉眼界下舉無意識界中間四識可以例知也宗泐曰此空十二因緣也無明者癡暗也謂於本性無所明了非懵然無知乃違理強覺之謂也無無明無無明盡者菩薩以般若智觀此無明其性本空無生滅相故云無無明亦無無明盡也乃至無老死亦無老死盡義與前同但舉其始末而略其中也十二因緣亦曰十二支一曰無明亦名煩惱二曰行謂造作諸業三曰識謂起妄念初托母胎也四曰名色從托胎後生諸根形也五曰六入謂於胎中而成六根也六曰觸成胎後六根對六塵也七曰受謂領納世間好惡等事八曰愛謂貪染五欲等事也九曰取謂於諸境生取著心也十曰有謂作有漏之因能招未來之果十一曰生謂受未來五蘊之身也十二曰老死謂未來身既老而死此十二因緣該三世因果展轉因依如輪旋轉無有休息一切眾生迷而不知良可悲也菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃林子曰梵語菩提華言覺梵語薩埵華言有情盖謂覺而有情也梵語涅槃華言無為依者皈依南無之義也古所云南無佛南無法南無僧者是也而涅槃無為是乃現成之公案也但皈依之而已矣故究竟之亦可入於涅槃楞伽經曰涅槃乃清淨不死不生之地一切脩行者之所依皈華嚴經曰有諍說生死無諍即涅槃六祖曰涅槃者圓滿清淨義又曰三界九地各有涅槃妙心三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提林子曰此與上章而並言之不曰菩提薩埵皈依般若波羅蜜多而究竟之可入於涅槃而三世諸佛亦皆皈依般若波羅蜜多而成無上正等正覺矣而無上正等正覺是亦現成之公案也若非親到彼岸者其孰能知之然菩提薩埵而曰依者有法而無為也三世諸佛而曰依者無法而無為也至於究竟涅槃其歸一也唐僧宗密曰佛者梵云婆伽婆唐言佛佛者覺也自覺覺他覺圓滿故一切有情咸具此道悟者即名佛迷者曰眾生宋王日休曰梵語阿此云無梵語耨多羅此云上梵語三此云正梵語藐此云等梵語菩提此云覺而曰阿耨多羅三藐三菩提者乃無上正等正覺謂真性也真性即佛故略言之則謂之覺詳言之則謂之無上正等正覺以真性無得而上之故云無上上自諸佛下至蠢動性相平等故云正等其覺圓明普照無偏無虧故云正覺潛溪曰三世謂過去莊嚴劫見在賢劫未來星宿劫也梵語佛此云覺覺者迷之對以佛之覺見眾生之迷也故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗林子曰彼岸中一切現成若未到彼岸夫誰得而知之既不得知必生驚疑既生驚疑心不信受既不信受必不皈依而曰真實不虗者此乃老婆心切盖欲以釋其驚疑之心而信受之而皈依之也潛溪曰言故知者結前起後也呪者佛說密語即第一義也神者精妙不測之稱明者鑑照不昧之謂無上無可加過也無等等獨絕無倫也既言大則已極矣又重言無上無等等者所以深著般若溥博無際也溥博無際惟真空足以當之故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶林子曰諦者苦集滅道之四諦也曰揭諦者揭此四諦也而又曰揭諦者揭此四諦之揭而揭之揭之而復揭之故能到彼岸而清淨而涅槃而無上正等正覺矣唐大顛云菩提是初薩婆訶是末宋何無垢曰若是有志底人一刀兩段更無退轉忽然悟道達本性空即得菩提超出三界了無所了得無所得蕩然清淨則到極樂之所受用無盡故曰薩婆訶宋僧道川曰山華笑野鳥歌此時如得意隨處薩婆訶又曰算盡目前無一法方能隨處薩婆訶自書心經釋略卷後林子曰釋氏極則之教古今現成之一大公案也無言無隱故釋迦住世四十有九年矣未嘗說一字而最上一乘豈其有關於言語文字哉夫既不關於言語文字矣則心經之作已失之支而又釋之者乎概自六祖而下佛教微矣而世之學佛者孰不曰我已得正受南能之宗也自悟自解自性自度然究其歸則與北秀之拂拭塵埃者等爾而所謂本來無物而為色空所不到處者則鮮有聞之矣故曰七祖如今未有人然非惟六祖而下為然也而靈山會上五千且退席矣夫有佛出世猶難與言如此況後世乎壇經曰不宜速說佛法難起余委不知佛法而亦強為之說焉既槩而論之復略而釋之余豈不知心經微旨不可得而說不可得而論不可得而釋之者哉而必欲說之而必欲論之而必欲釋之者余敢曰能明佛法之第一義心經之微旨邪而二乘之著空則庶乎可以遮其非而最上一乘或有所聞而知自悟而興起之矣三教主人龍江兆恩
